name: Tester

on:
  issues:
    types: [opened]

env:
  PR_STALE_DAYS: 1  # 180
  PR_CLOSE_DAYS: 2  # 90

jobs:
    tester:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout
          run: REPO=ac000/libac

          uses: actions/checkout@v5
          with:
                repository: $REPO

name: Tester

on:
  issues:
    types: [opened]

env:
  PR_STALE_DAYS: 1  # 180
  PR_CLOSE_DAYS: 2  # 90

jobs:
    tester:
      runs-on: ubuntu-latest

      name: Checkout
      steps:
        - run: echo "REPO=ac000/libac" >>"$GITHUB_ENV"

        - uses: actions/checkout@v5
          with:
            repository: ${{ env.REPO }}

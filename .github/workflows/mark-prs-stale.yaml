name: Mark Stale Pull Requests

on:
  schedule:
    - cron: '55 20 * * *'  # Run every day at 02:22

env:
  PR_STALE_DAYS: 1
  PR_CLOSE_DAYS: 2

jobs:
  mark_stale_prs:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Mark stale pull requests
        uses: actions/stale@v5
        with:
          stale-pr-message: "This pull-request has been automatically marked 'stale' because it has been inactive for more than ${{ env.PR_STALE_DAYS }} days."
          close-pr-message: "This pull-request has been automatically closed because it has been inactive for ${{ env.PR_CLOSE_DAYS }} days."
          days-before-issue-stale: -1
          days-before-issue-close: -1
          days-before-stale: ${{ env.PR_STALE_DAYS }}
          days-before-close: ${{ env.PR_CLOSE_DAYS }}
          stale-pr-label: stale
